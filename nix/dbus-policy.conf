<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root may own the name (the trigger runs as root). -->
  <policy user="root">
    <allow own="systems.staticroot.Trigger"/>
  </policy>

  <!-- Only the agent user may talk to the trigger. -->
  <policy user="@agentUser@">
    <allow send_destination="systems.staticroot.Trigger"/>
  </policy>

  <!-- Everyone else is denied outright. -->
  <policy context="default">
    <deny own="systems.staticroot.Trigger"/>
    <deny send_destination="systems.staticroot.Trigger"/>
  </policy>
</busconfig>
